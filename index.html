<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚀 Deploy Python Telegram Bot on Render — Free Guide</title>
  <meta name="description" content="Complete step-by-step guide to deploy your Python Telegram Bot on Render for FREE. Health checks, GitHub CI/CD, environment variables, troubleshooting." />
  <meta name="robots" content="index, follow" />

  <!-- Fonts: Sharp display + clean mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ================================================================
       DESIGN TOKENS
    ================================================================ */
    :root {
      /* Pure black base */
      --void:        #000000;
      --base:        #060608;
      --surface:     #0a0a0f;
      --surface-2:   #0f0f17;
      --surface-3:   #141420;

      /* Glass layers */
      --glass-1:     rgba(255,255,255,0.03);
      --glass-2:     rgba(255,255,255,0.055);
      --glass-3:     rgba(255,255,255,0.08);
      --glass-border: rgba(255,255,255,0.08);
      --glass-border-bright: rgba(255,255,255,0.15);

      /* Accent palette — vivid, no pastels */
      --cyan:        #00d4ff;
      --cyan-bright: #22eeff;
      --cyan-glow:   rgba(0, 212, 255, 0.20);
      --cyan-dim:    rgba(0, 212, 255, 0.08);
      --cyan-mid:    rgba(0, 212, 255, 0.14);

      --violet:      #a855f7;
      --violet-bright:#c084fc;
      --violet-glow: rgba(168, 85, 247, 0.20);
      --violet-dim:  rgba(168, 85, 247, 0.08);

      --emerald:     #10b981;
      --emerald-bright:#34d399;
      --emerald-glow:rgba(16, 185, 129, 0.20);
      --emerald-dim: rgba(16, 185, 129, 0.08);

      --amber:       #f59e0b;
      --amber-bright:#fbbf24;
      --amber-glow:  rgba(245, 158, 11, 0.20);
      --amber-dim:   rgba(245, 158, 11, 0.08);

      --rose:        #f43f5e;
      --rose-bright: #fb7185;
      --rose-glow:   rgba(244, 63, 94, 0.20);
      --rose-dim:    rgba(244, 63, 94, 0.08);

      /* Typography */
      --text-1:      #f8fafc;
      --text-2:      #cbd5e1;
      --text-3:      #64748b;
      --text-4:      #334155;

      --font-display: 'Outfit', sans-serif;
      --font-body:   'Space Grotesk', sans-serif;
      --font-mono:   'Fira Code', 'JetBrains Mono', monospace;

      /* Radius */
      --r-xs: 4px;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 22px;
      --r-2xl:32px;

      /* Shadows */
      --shadow-sm:   0 2px 8px rgba(0,0,0,0.4);
      --shadow-md:   0 4px 24px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.04) inset;
      --shadow-lg:   0 8px 48px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.05) inset;
      --shadow-cyan: 0 0 32px rgba(0,212,255,0.18), 0 0 80px rgba(0,212,255,0.07);
      --shadow-violet:0 0 32px rgba(168,85,247,0.18);

      --nav-h: 60px;
      --ease: cubic-bezier(0.4,0,0.2,1);
    }

    /* ================================================================
       RESET & BASE
    ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,212,255,0.3); }

    body {
      background: var(--void);
      color: var(--text-2);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.7;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ================================================================
       ANIMATED BACKGROUND
    ================================================================ */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0;
      animation: orbPulse 20s ease-in-out infinite;
    }
    .orb-1 { width: 900px; height: 900px; background: radial-gradient(circle, #00d4ff 0%, transparent 70%); top: -300px; right: -200px; opacity: 0.06; animation-duration: 18s; }
    .orb-2 { width: 700px; height: 700px; background: radial-gradient(circle, #a855f7 0%, transparent 70%); bottom: -100px; left: -200px; opacity: 0.07; animation-duration: 24s; animation-delay: -8s; }
    .orb-3 { width: 500px; height: 500px; background: radial-gradient(circle, #10b981 0%, transparent 70%); top: 50%; left: 40%; opacity: 0.04; animation-duration: 30s; animation-delay: -14s; }
    .orb-4 { width: 400px; height: 400px; background: radial-gradient(circle, #f59e0b 0%, transparent 70%); bottom: 30%; right: 15%; opacity: 0.035; animation-duration: 22s; animation-delay: -6s; }

    @keyframes orbPulse {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(40px,-50px) scale(1.06); }
      50% { transform: translate(-30px,30px) scale(0.95); }
      75% { transform: translate(20px,40px) scale(1.03); }
    }

    /* Grid noise texture */
    #bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
    }

    /* ================================================================
       PROGRESS BAR
    ================================================================ */
    #progress {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--violet), var(--cyan));
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
      z-index: 9999;
      transition: width 0.1s linear;
      box-shadow: 0 0 16px var(--cyan-glow);
    }
    @keyframes shimmer { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }

    /* ================================================================
       LOADING SCREEN
    ================================================================ */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--void);
      z-index: 9998;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.6s var(--ease), visibility 0.6s var(--ease);
    }
    #loader.out { opacity: 0; visibility: hidden; }

    .loader-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--cyan-dim), var(--violet-dim));
      border: 1px solid var(--glass-border-bright);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: var(--shadow-cyan);
      animation: loaderPulse 1.8s ease-in-out infinite;
    }
    @keyframes loaderPulse {
      0%,100% { transform: scale(1); box-shadow: var(--shadow-cyan); }
      50% { transform: scale(1.06); box-shadow: 0 0 48px rgba(0,212,255,0.3); }
    }

    .loader-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-1);
    }

    .loader-track {
      width: 220px;
      height: 2px;
      background: var(--glass-border);
      border-radius: 1px;
      overflow: hidden;
    }
    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--violet));
      border-radius: 1px;
      animation: loaderFill 1.8s cubic-bezier(0.4,0,0.6,1) forwards;
    }
    @keyframes loaderFill { from{width:0} to{width:100%} }

    .loader-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-4);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ================================================================
       NAVBAR
    ================================================================ */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 800;
      backdrop-filter: blur(32px) saturate(200%) brightness(0.4);
      -webkit-backdrop-filter: blur(32px) saturate(200%) brightness(0.4);
      background: rgba(0,0,0,0.75);
      border-bottom: 1px solid var(--glass-border);
      transition: all 0.3s var(--ease);
    }
    #nav.scrolled {
      background: rgba(0,0,0,0.9);
      border-bottom-color: var(--glass-border-bright);
      box-shadow: 0 1px 40px rgba(0,0,0,0.8);
    }

    .nav-wrap {
      max-width: 1220px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .brand-orb {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 16px var(--cyan-glow);
      flex-shrink: 0;
    }

    .brand-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.93rem;
      color: var(--text-1);
      letter-spacing: -0.02em;
    }

    .nav-center {
      flex: 1;
      max-width: 340px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--glass-1);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      padding: 7px 12px;
      transition: all 0.2s var(--ease);
      cursor: text;
      width: 100%;
    }
    .search-box:focus-within {
      border-color: var(--cyan);
      background: var(--cyan-dim);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
    }
    .search-icon { color: var(--text-4); font-size: 13px; flex-shrink: 0; }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-1);
      width: 100%;
    }
    .search-box input::placeholder { color: var(--text-4); }
    .search-kbd {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-4);
      background: var(--glass-2);
      border: 1px solid var(--glass-border);
      border-radius: 4px;
      padding: 1px 6px;
      flex-shrink: 0;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-btn {
      height: 34px;
      padding: 0 12px;
      border-radius: var(--r-sm);
      border: 1px solid var(--glass-border);
      background: var(--glass-1);
      color: var(--text-3);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      text-decoration: none;
    }
    .nav-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
    .nav-btn.active { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }

    /* ================================================================
       FLOATING TOC
    ================================================================ */
    #toc {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 600;
      background: rgba(6,6,8,0.9);
      backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      padding: 14px;
      max-width: 190px;
      box-shadow: var(--shadow-md);
    }

    .toc-head {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-4);
      margin-bottom: 8px;
      padding-left: 6px;
    }

    .toc-link {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-4);
      text-decoration: none;
      padding: 3px 8px;
      border-radius: 5px;
      border-left: 2px solid transparent;
      transition: all 0.15s var(--ease);
      line-height: 1.5;
    }
    .toc-link:hover { color: var(--text-2); background: var(--glass-1); }
    .toc-link.on { color: var(--cyan); border-left-color: var(--cyan); background: var(--cyan-dim); }

    @media(max-width: 1300px) { #toc { display: none; } }

    /* ================================================================
       BACK TO TOP
    ================================================================ */
    #btt {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(6,6,8,0.9);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      color: var(--text-3);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 600;
      opacity: 0;
      transform: translateY(12px) scale(0.9);
      transition: all 0.3s var(--ease);
      box-shadow: var(--shadow-sm);
    }
    #btt.show { opacity: 1; transform: translateY(0) scale(1); }
    #btt:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); box-shadow: var(--shadow-cyan); }

    /* ================================================================
       LAYOUT
    ================================================================ */
    #app {
      position: relative;
      z-index: 1;
      padding-top: var(--nav-h);
    }

    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ================================================================
       HERO
    ================================================================ */
    #hero {
      padding: 96px 24px 80px;
      text-align: center;
      position: relative;
    }

    .hero-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      border-radius: 100px;
      background: var(--glass-2);
      border: 1px solid var(--glass-border-bright);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--cyan);
      margin-bottom: 28px;
      animation: up 0.7s var(--ease) both;
      backdrop-filter: blur(8px);
    }
    .hero-chip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: blink 2s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .hero-h1 {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: var(--text-1);
      margin-bottom: 18px;
      animation: up 0.7s var(--ease) 0.1s both;
    }

    .grd {
      background: linear-gradient(120deg, var(--cyan) 0%, var(--violet) 50%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 1.05rem;
      color: var(--text-3);
      max-width: 520px;
      margin: 0 auto 44px;
      animation: up 0.7s var(--ease) 0.2s both;
      line-height: 1.8;
    }

    .hero-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      animation: up 0.7s var(--ease) 0.3s both;
      background: var(--glass-1);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-xl);
      backdrop-filter: blur(12px);
      padding: 20px 32px;
      max-width: 560px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
      min-width: 100px;
    }

    .stat-val {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-1);
      letter-spacing: -0.03em;
    }
    .stat-val.c { color: var(--cyan); }
    .stat-val.v { color: var(--violet-bright); }
    .stat-val.e { color: var(--emerald-bright); }
    .stat-val.a { color: var(--amber-bright); }

    .stat-lbl {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .stat-sep { width: 1px; height: 36px; background: var(--glass-border-bright); margin: 0 4px; }

    @keyframes up {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ================================================================
       SECTIONS
    ================================================================ */
    .sec {
      padding: 64px 0;
    }

    .sec-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .sec-num {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--cyan);
      background: var(--cyan-dim);
      border: 1px solid rgba(0,212,255,0.18);
      border-radius: var(--r-xs);
      padding: 2px 8px;
      letter-spacing: 0.06em;
    }

    .sec-title {
      font-family: var(--font-display);
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-1);
    }

    .sec-rule {
      height: 1px;
      background: linear-gradient(90deg, var(--glass-border-bright) 0%, transparent 70%);
      margin-bottom: 36px;
    }

    /* ================================================================
       GLASS CARDS
    ================================================================ */
    .g-card {
      background: var(--glass-1);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-xl);
      padding: 24px;
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow-md);
      transition: all 0.3s var(--ease);
      position: relative;
      overflow: hidden;
    }
    .g-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.025) 0%, transparent 60%);
      pointer-events: none;
    }
    .g-card:hover {
      border-color: var(--glass-border-bright);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg), 0 0 40px rgba(0,212,255,0.06);
    }

    /* Icon cards grid */
    .i-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }

    .i-card {
      background: var(--glass-1);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.3s var(--ease);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }
    .i-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 0 0 var(--r-lg) var(--r-lg);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s var(--ease);
    }
    .i-card.c::after { background: linear-gradient(90deg, var(--cyan), var(--cyan-bright)); }
    .i-card.v::after { background: linear-gradient(90deg, var(--violet), var(--violet-bright)); }
    .i-card.e::after { background: linear-gradient(90deg, var(--emerald), var(--emerald-bright)); }
    .i-card.a::after { background: linear-gradient(90deg, var(--amber), var(--amber-bright)); }
    .i-card:hover::after { transform: scaleX(1); }
    .i-card:hover { border-color: var(--glass-border-bright); transform: translateY(-3px); box-shadow: var(--shadow-md); }

    .i-icon {
      width: 44px; height: 44px;
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .i-icon.c { background: var(--cyan-dim); border: 1px solid rgba(0,212,255,0.15); }
    .i-icon.v { background: var(--violet-dim); border: 1px solid rgba(168,85,247,0.15); }
    .i-icon.e { background: var(--emerald-dim); border: 1px solid rgba(16,185,129,0.15); }
    .i-icon.a { background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.15); }

    .i-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-1);
    }
    .i-desc {
      font-size: 0.82rem;
      color: var(--text-3);
      line-height: 1.6;
    }

    /* ================================================================
       CODE BLOCKS
    ================================================================ */
    .cb {
      margin: 18px 0;
      border-radius: var(--r-lg);
      overflow: hidden;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-sm);
    }

    .cb-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      background: rgba(0,0,0,0.5);
      border-bottom: 1px solid var(--glass-border);
    }

    .cb-lang {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-4);
    }

    .cb-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .cb-dot.python { background: #3b82f6; }
    .cb-dot.bash { background: var(--emerald); }
    .cb-dot.txt  { background: var(--amber); }
    .cb-dot.default { background: var(--violet); }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 0.66rem;
      color: var(--text-4);
      background: var(--glass-1);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-xs);
      padding: 3px 9px;
      cursor: pointer;
      transition: all 0.2s var(--ease);
    }
    .copy-btn:hover { color: var(--cyan); border-color: var(--cyan); background: var(--cyan-dim); }
    .copy-btn.ok { color: var(--emerald); border-color: var(--emerald); background: var(--emerald-dim); }

    pre {
      background: #020204;
      padding: 20px;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 1.9;
      color: #94a3b8;
    }

    /* Syntax */
    .kw  { color: #c084fc; font-weight: 500; }
    .fn  { color: #34d399; }
    .str { color: #fde68a; }
    .cm  { color: #334155; font-style: italic; }
    .nb  { color: #67e8f9; }
    .num { color: #f9a8d4; }
    .cls { color: #fbbf24; }
    .dec { color: var(--cyan); }
    .vn  { color: #e2e8f0; }
    .op  { color: #c084fc; }

    /* Inline code */
    code.ic {
      font-family: var(--font-mono);
      font-size: 0.8em;
      background: var(--cyan-dim);
      border: 1px solid rgba(0,212,255,0.12);
      border-radius: var(--r-xs);
      padding: 1px 7px;
      color: var(--cyan);
    }

    /* ================================================================
       FILE TREE
    ================================================================ */
    .ftree {
      background: #020204;
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      padding: 20px 24px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 2.2;
    }
    .ft-dir  { color: var(--cyan); font-weight: 600; }
    .ft-file { color: var(--text-2); }
    .ft-ln   { color: var(--text-4); }
    .ft-cm   { color: var(--text-4); font-size: 0.73rem; }

    /* ================================================================
       TIMELINE
    ================================================================ */
    .tl {
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .tl::before {
      content: '';
      position: absolute;
      left: 21px;
      top: 30px;
      bottom: 30px;
      width: 1px;
      background: linear-gradient(180deg, var(--cyan) 0%, var(--violet) 50%, transparent 100%);
      opacity: 0.25;
    }

    .tl-row {
      display: flex;
      gap: 20px;
      padding: 14px 0;
    }

    .tl-dot {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--glass-2);
      border: 1.5px solid var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--cyan);
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(0,212,255,0.15), inset 0 0 12px rgba(0,212,255,0.05);
      z-index: 1;
      backdrop-filter: blur(8px);
    }

    .tl-body { flex: 1; padding: 8px 0; }
    .tl-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.98rem;
      color: var(--text-1);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tl-desc {
      font-size: 0.84rem;
      color: var(--text-3);
      margin-bottom: 10px;
      line-height: 1.65;
    }

    .badge-free {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      background: var(--emerald-dim);
      border: 1px solid rgba(16,185,129,0.2);
      color: var(--emerald-bright);
      border-radius: var(--r-xs);
      padding: 1px 7px;
    }

    /* ================================================================
       ENV TABLE
    ================================================================ */
    .env-wrap {
      border-radius: var(--r-xl);
      overflow: hidden;
      border: 1px solid var(--glass-border);
      background: var(--glass-1);
    }

    table.env {
      width: 100%;
      border-collapse: collapse;
    }
    .env th {
      font-family: var(--font-mono);
      font-size: 0.64rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-4);
      padding: 12px 18px;
      border-bottom: 1px solid var(--glass-border);
      text-align: left;
    }
    .env td {
      padding: 13px 18px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      border-bottom: 1px solid var(--glass-border);
      vertical-align: top;
    }
    .env tr:last-child td { border-bottom: none; }
    .env tr:hover td { background: var(--glass-1); }

    .env-k { color: var(--cyan); }
    .env-v { color: var(--amber-bright); }
    .env-d { color: var(--text-3); font-family: var(--font-body); font-size: 0.8rem; }

    /* ================================================================
       CALLOUT
    ================================================================ */
    .callout {
      display: flex;
      gap: 14px;
      padding: 16px 20px;
      border-radius: var(--r-lg);
      margin: 20px 0;
      align-items: flex-start;
      backdrop-filter: blur(8px);
    }
    .callout.info    { background: var(--cyan-dim);    border: 1px solid rgba(0,212,255,0.18); }
    .callout.warn    { background: var(--amber-dim);   border: 1px solid rgba(245,158,11,0.2); }
    .callout.success { background: var(--emerald-dim); border: 1px solid rgba(16,185,129,0.2); }
    .callout.error   { background: var(--rose-dim);    border: 1px solid rgba(244,63,94,0.2); }

    .co-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .co-body { flex: 1; }
    .co-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.88rem;
      margin-bottom: 4px;
    }
    .callout.info .co-title    { color: var(--cyan); }
    .callout.warn .co-title    { color: var(--amber-bright); }
    .callout.success .co-title { color: var(--emerald-bright); }
    .callout.error .co-title   { color: var(--rose-bright); }
    .co-text { font-size: 0.83rem; color: var(--text-3); line-height: 1.65; }

    /* ================================================================
       ERROR ACCORDIONS
    ================================================================ */
    .err-list { display: flex; flex-direction: column; gap: 12px; }

    .err-card {
      background: var(--glass-1);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: all 0.25s var(--ease);
      backdrop-filter: blur(12px);
    }
    .err-card:hover { border-color: var(--glass-border-bright); }

    .err-hd {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .err-hd:hover { background: var(--glass-1); }

    .err-tag {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      background: var(--rose-dim);
      border: 1px solid rgba(244,63,94,0.2);
      color: var(--rose-bright);
      border-radius: var(--r-xs);
      padding: 2px 8px;
      flex-shrink: 0;
    }

    .err-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-1);
      flex: 1;
    }

    .err-chevron {
      color: var(--text-4);
      font-size: 11px;
      transition: transform 0.25s var(--ease);
    }
    .err-chevron.open { transform: rotate(180deg); }

    .err-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s var(--ease);
    }
    .err-body.open { max-height: 1000px; }

    .err-inner {
      padding: 14px 18px 18px;
      border-top: 1px solid var(--glass-border);
    }
    .err-msg { font-size: 0.83rem; color: var(--text-3); margin-bottom: 12px; line-height: 1.6; }
    .fix-lbl {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--emerald-bright);
      margin-bottom: 8px;
    }

    /* ================================================================
       LOG TERMINAL
    ================================================================ */
    .log-term {
      background: #000;
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      padding: 20px;
      font-family: var(--font-mono);
      font-size: 0.76rem;
      line-height: 2;
      overflow-x: auto;
    }
    .log-row { display: flex; gap: 14px; align-items: baseline; }
    .log-ts   { color: var(--text-4); flex-shrink: 0; font-size: 0.68rem; }
    .log-lvl-info    { color: var(--cyan); }
    .log-lvl-warn    { color: var(--amber-bright); }
    .log-lvl-err     { color: var(--rose-bright); }
    .log-lvl-success { color: var(--emerald-bright); }
    .log-msg  { color: #94a3b8; }

    /* ================================================================
       FAQ
    ================================================================ */
    .faq-list { display: flex; flex-direction: column; gap: 10px; }

    .faq {
      background: var(--glass-1);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: all 0.25s var(--ease);
      backdrop-filter: blur(12px);
    }
    .faq:hover { border-color: var(--glass-border-bright); }

    .faq-q {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.91rem;
      color: var(--text-1);
      user-select: none;
      gap: 12px;
      transition: color 0.2s;
    }
    .faq-q:hover { color: var(--cyan); }
    .faq-arr { color: var(--text-4); font-size: 11px; transition: transform 0.3s var(--ease); flex-shrink: 0; }
    .faq-arr.open { transform: rotate(180deg); color: var(--cyan); }

    .faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s var(--ease);
    }
    .faq-a.open { max-height: 400px; }
    .faq-a-in {
      padding: 0 20px 16px;
      font-size: 0.86rem;
      color: var(--text-3);
      line-height: 1.75;
      border-top: 1px solid var(--glass-border);
    }

    /* ================================================================
       TIPS GRID
    ================================================================ */
    .tips-g {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .tip {
      background: var(--glass-1);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.3s var(--ease);
      backdrop-filter: blur(12px);
    }
    .tip:hover { border-color: var(--violet); transform: translateY(-2px); box-shadow: var(--shadow-violet); }

    .tip-em { font-size: 24px; }
    .tip-nm { font-family: var(--font-display); font-weight: 700; font-size: 0.88rem; color: var(--text-1); }
    .tip-tx { font-size: 0.81rem; color: var(--text-3); line-height: 1.65; }

    /* ================================================================
       LIMITS GRID
    ================================================================ */
    .lim-g {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
    }

    .lim {
      background: var(--glass-1);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      padding: 24px 16px;
      text-align: center;
      transition: all 0.3s var(--ease);
      backdrop-filter: blur(12px);
    }
    .lim:hover { border-color: var(--amber); box-shadow: 0 0 24px var(--amber-glow); }

    .lim-val {
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--amber), var(--amber-bright));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      letter-spacing: -0.03em;
    }
    .lim-lbl { font-size: 0.78rem; color: var(--text-3); line-height: 1.4; }

    /* ================================================================
       CTA SECTION
    ================================================================ */
    #cta {
      padding: 80px 24px 100px;
      text-align: center;
    }

    .cta-box {
      background: var(--glass-1);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-2xl);
      padding: 64px 48px;
      max-width: 680px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-lg);
    }
    .cta-box::before {
      content: '';
      position: absolute;
      top: -1px; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--violet), transparent);
    }
    .cta-box::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,212,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .cta-em { font-size: 3rem; margin-bottom: 16px; animation: spin 4s linear infinite; display: block; }
    @keyframes spin { 0%,100%{transform: rotate(0deg)} 25%{transform: rotate(8deg)} 75%{transform: rotate(-8deg)} }

    .cta-h { font-family: var(--font-display); font-size: 2.2rem; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 14px; color: var(--text-1); line-height: 1.1; }
    .cta-p { font-size: 0.95rem; color: var(--text-3); max-width: 420px; margin: 0 auto 36px; line-height: 1.8; }

    .cta-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .btn-p {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      color: #000;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.88rem;
      border: none;
      border-radius: var(--r-md);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s var(--ease);
      letter-spacing: -0.01em;
      box-shadow: 0 4px 24px rgba(0,212,255,0.25);
    }
    .btn-p:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(0,212,255,0.35); opacity: 0.95; }

    .btn-s {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: var(--glass-2);
      color: var(--text-1);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.88rem;
      border: 1px solid var(--glass-border-bright);
      border-radius: var(--r-md);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s var(--ease);
      backdrop-filter: blur(8px);
    }
    .btn-s:hover { border-color: var(--violet); color: var(--violet-bright); background: var(--violet-dim); }

    .cta-tags {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 36px;
    }
    .cta-tag {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--emerald-bright);
      background: var(--emerald-dim);
      border: 1px solid rgba(16,185,129,0.18);
      border-radius: 100px;
      padding: 4px 12px;
    }

    /* ================================================================
       FOOTER
    ================================================================ */
    footer {
      background: var(--glass-1);
      border-top: 1px solid var(--glass-border);
      padding: 36px 24px;
      backdrop-filter: blur(20px);
    }
    .foot-in {
      max-width: 880px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }
    .foot-brand { font-family: var(--font-display); font-weight: 700; font-size: 0.88rem; color: var(--text-1); }
    .foot-sub { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-4); margin-top: 3px; }
    .foot-links { display: flex; gap: 20px; }
    .foot-link { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-4); text-decoration: none; transition: color 0.2s; }
    .foot-link:hover { color: var(--cyan); }
    .foot-copy { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-4); }

    /* ================================================================
       SCROLL REVEAL
    ================================================================ */
    .rv {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.55s var(--ease), transform 0.55s var(--ease);
    }
    .rv.vis { opacity: 1; transform: translateY(0); }
    .rv.d1  { transition-delay: 0.08s; }
    .rv.d2  { transition-delay: 0.16s; }
    .rv.d3  { transition-delay: 0.24s; }

    /* ================================================================
       SEARCH HIGHLIGHT
    ================================================================ */
    .sh { background: rgba(0,212,255,0.22); border-radius: 2px; }

    /* ================================================================
       PROSE
    ================================================================ */
    p.body-t { color: var(--text-3); line-height: 1.8; margin-bottom: 16px; font-size: 0.9rem; }
    p.body-t:last-child { margin-bottom: 0; }
    p.body-t strong { color: var(--text-1); font-weight: 600; }

    ul.dot-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 8px; }
    ul.dot-list li { display: flex; gap: 10px; align-items: flex-start; font-size: 0.87rem; color: var(--text-3); }
    ul.dot-list li::before { content: '▸'; color: var(--cyan); flex-shrink: 0; margin-top: 3px; font-size: 0.72rem; }

    /* ================================================================
       RESPONSIVE
    ================================================================ */
    @media(max-width: 768px) {
      .nav-center { display: none; }
      #hero { padding: 72px 20px 60px; }
      .hero-stats { padding: 16px 20px; }
      .stat-sep { display: none; }

    }

    @media(max-width: 480px) {
      .hero-h1 { font-size: 2rem; }
      .i-grid { grid-template-columns: 1fr; }

<!-- REACT ROOT -->
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  /* ─── COPY BUTTON ───────────────────────────────────── */
  function CopyBtn({ code }) {
    const [ok, setOk] = useState(false);
    const copy = async () => {
      try { await navigator.clipboard.writeText(code); } catch(e) { /* fallback */ }
      setOk(true);
      setTimeout(() => setOk(false), 2000);
    };
    return (
      <button className={`copy-btn ${ok ? 'ok' : ''}`} onClick={copy}>
        {ok ? '✓ Copied' : '⎘ Copy'}
      </button>
    );
  }

  /* ─── CODE BLOCK ────────────────────────────────────── */
  function CB({ lang, code, hl }) {
    const langDot = lang === 'python' ? 'python' : lang === 'bash' ? 'bash' : lang.includes('txt') || lang.includes('req') ? 'txt' : 'default';
    return (
      <div className="cb">
        <div className="cb-head">
          <span className="cb-lang">
            <span className={`cb-dot ${langDot}`}></span>
            {lang}

        const pg = document.getElementById('progress');
        if (pg) pg.style.width = pct + '%';
        const btt = document.getElementById('btt');

        });
        document.querySelectorAll('.toc-link').forEach(a => {

        });
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      return () => window.removeEventListener('scroll', onScroll);
    }, []);

      document.querySelectorAll('.rv').forEach(el => io.observe(el));

).start()`;

                  <div className="tip-nm">{t.nm}</div>
                  <div className="tip-tx">{t.tx}</div>

              {[
                { val:'750h',   lbl:'CPU hours / month' },

                { val:'~15m',   lbl:'Spin-down after inactivity' },

              ))}
            </div>
            <div className="rv d2">
              <Callout type="warn" icon="⏱" title="Spin-Down Behavior">
                Free services spin down after ~15 minutes of inactivity. When a new request comes in, there's a
                cold-start delay of 30–60 seconds. For bots using polling (not webhooks), Render keeps the service
                running as long as it receives periodic health checks — your bot stays alive 24/7.
              </Callout>
            </div>
          </Sec>

          {/* 13. FAQ */}
          <Sec id="faq" n="13" title="Frequently Asked Questions">
            <div className="faq-list rv">
              {[
                {
                  q:"Does my bot stay alive 24/7 on the free tier?",
                  a:"Yes, if your bot uses long-polling (the default for python-telegram-bot). Since polling generates continuous activity, Render's inactivity timer never triggers. Webhook-based bots would need an external pinger to stay warm."
                },
                {
                  q:"Can I use a database with my free bot?",
                  a:"Yes! Use external database services like Supabase (PostgreSQL), MongoDB Atlas, or Redis Cloud — all have free tiers. Avoid writing files locally since Render's free tier has ephemeral storage that resets on each deploy."
                },
                {
                  q:"How do I update my bot after deployment?",
                  a:"Simply push your changes to the connected GitHub branch (e.g. main). Render detects the push via webhook and automatically rebuilds and redeploys your service. You'll see the new deploy appear in the Deploys tab."
                },
                {
                  q:"Can I run multiple bots on one free account?",
                  a:"Yes. Each bot is a separate Web Service on Render. The free plan gives you 750 CPU hours/month shared across all services, so plan accordingly — 2–3 light bots should fit comfortably within that budget."
                },
                {
                  q:"What Python version does Render use?",
                  a:"Render uses Python 3.11+ by default. You can specify a version by adding a .python-version file to your repo with content like \"3.11.0\", or by setting the PYTHON_VERSION environment variable."
                },
                {
                  q:"How do I add a custom domain to my bot's health endpoint?",
                  a:"Render provides a free .onrender.com subdomain automatically. For a custom domain, go to Settings → Custom Domains in your service dashboard and add your domain — HTTPS is provisioned automatically via Let's Encrypt."
                },
              ].map(f => <Faq key={f.q} q={f.q} a={f.a} />)}
            </div>
          </Sec>
